{% extends 'blog/base.html' %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="auth-container">
    <div class="auth-card">
        <img src="{% static 'image/bloglist_blocky_outline.svg' %}" 
            class="profile-image-pic rounded-circle" alt="BlogList">
        
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Log in to your account</p>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="uname" 
                    placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="upassword" 
                    placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-auth">Log In</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup-page' %}">Create one here</a>
        </div>
    </div>
</div>

{% endblock %}
